<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>周期分析服务</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #0f172a;
    }
    .wrap {
      max-width: 1800px;
      margin: 0 auto;
      padding: 16px 20px;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(360px, 430px) minmax(860px, 1fr);
      gap: 14px;
      align-items: start;
    }
    .left-col {
      position: sticky;
      top: 12px;
      max-height: calc(100vh - 24px);
      overflow: auto;
      padding-right: 4px;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .right-card {
      display: flex;
      flex-direction: column;
      margin-bottom: 0;
    }
    h1 {
      margin: 0 0 10px 0;
      font-size: 22px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .tab-btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #334155;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .tab-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #475569;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid #2563eb;
      background: #2563eb;
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    button.secondary {
      border-color: #cbd5e1;
      color: #334155;
      background: #fff;
    }
    .muted { color: #64748b; font-size: 12px; }
    .error { color: #b91c1c; font-size: 13px; }
    .ok { color: #065f46; font-size: 13px; }
    .split-line {
      margin: 12px 0;
      border-top: 1px dashed #d1d5db;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .kpi {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 8px;
      background: #fafcff;
    }
    .kpi .k { font-size: 11px; color: #64748b; }
    .kpi .v { font-size: 15px; font-weight: 700; margin-top: 3px; }
    .preview-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .preview-title {
      font-size: 14px;
      color: #334155;
      font-weight: 600;
    }
    .iframe-wrap {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      flex: 1;
      min-height: 560px;
    }
    .iframe-wrap:fullscreen {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
    }
    iframe {
      width: 100%;
      height: 72vh;
      min-height: 560px;
      border: none;
      background: #fff;
      display: block;
    }
    .iframe-wrap:fullscreen iframe {
      height: 100%;
      min-height: 0;
    }
    .hint {
      color: #64748b;
      font-size: 12px;
      margin-top: 10px;
    }
    .table-wrap {
      margin-top: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: auto;
      max-height: 420px;
      background: #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 650px;
      font-size: 12px;
    }
    th, td {
      padding: 8px;
      border-bottom: 1px solid #f1f5f9;
      text-align: left;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      background: #f8fafc;
      color: #475569;
      z-index: 1;
    }
    tbody tr {
      cursor: pointer;
    }
    tbody tr:hover {
      background: #f8fafc;
    }
    tbody tr.selected {
      background: #e0e7ff;
    }
    .rise { color: #b91c1c; }
    .fall { color: #047857; }
    .uptrend-meta {
      margin-top: 8px;
      color: #475569;
      font-size: 12px;
    }
    .section-title {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }
    .history-row {
      cursor: pointer;
    }
    .history-row.selected {
      background: #e0e7ff;
    }
    .tag {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 11px;
      line-height: 18px;
      border: 1px solid #cbd5e1;
      color: #334155;
      background: #f8fafc;
    }
    .tag.done {
      color: #065f46;
      border-color: #86efac;
      background: #f0fdf4;
    }
    .tag.error {
      color: #b91c1c;
      border-color: #fecaca;
      background: #fef2f2;
    }
    .tag.running {
      color: #92400e;
      border-color: #fcd34d;
      background: #fffbeb;
    }
    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .left-col {
        position: static;
        max-height: none;
        overflow: visible;
        padding-right: 0;
      }
      .right-card {
        min-height: auto;
        margin-bottom: 14px;
      }
      .iframe-wrap {
        min-height: 520px;
      }
      iframe {
        height: 72vh;
        min-height: 520px;
      }
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      iframe { height: 68vh; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="layout">
      <div class="left-col">
        <div class="card">
          <h1>A股周期分析服务</h1>
          <div class="tabs">
            <button class="tab-btn active" data-tab="single">A股周期分析服务</button>
            <button class="tab-btn" data-tab="uptrend">上行周期股票筛选</button>
          </div>

          <div id="panelSingle" class="tab-panel active">
            <div class="grid">
              <div>
                <label>公司名</label>
                <input id="name" value="中际旭创" />
              </div>
              <div>
                <label>threshold</label>
                <input id="threshold" type="number" step="0.01" value="0.08" />
              </div>
              <div>
                <label>min-gap</label>
                <input id="minGap" type="number" step="1" value="5" />
              </div>
              <div>
                <label>lookback-days</label>
                <input id="lookback" type="number" step="1" value="365" />
              </div>
            </div>
            <div class="actions">
              <button id="runBtn">生成HTML报告</button>
              <span id="singleStatus" class="muted">等待执行</span>
            </div>
            <div class="hint">输入公司名直接生成周期报告。</div>
          </div>

          <div id="panelUptrend" class="tab-panel">
            <div class="grid">
              <div>
                <label>threshold</label>
                <input id="upThreshold" type="number" step="0.01" value="0.08" />
              </div>
              <div>
                <label>min-gap</label>
                <input id="upMinGap" type="number" step="1" value="5" />
              </div>
              <div>
                <label>lookback-days</label>
                <input id="upLookback" type="number" step="1" value="365" />
              </div>
              <div>
                <label>min-rows</label>
                <input id="upMinRows" type="number" step="1" value="60" />
              </div>
              <div>
                <label>top-k (0=全部)</label>
                <input id="upTopK" type="number" step="1" value="150" />
              </div>
              <div>
                <label>end-date (可选)</label>
                <input id="upEndDate" type="date" />
              </div>
            </div>
            <div class="actions">
              <button id="scanBtn">筛选上行股票</button>
              <button id="clearBtn" class="secondary" type="button">清空列表</button>
              <span id="upStatus" class="muted">等待筛选</span>
            </div>
            <div id="upError" class="error"></div>
            <div id="upMeta" class="uptrend-meta"></div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>股票</th>
                    <th>代码</th>
                    <th>最新收盘</th>
                    <th>最近交易日</th>
                    <th>最近周期涨幅</th>
                    <th>距最后极值天数</th>
                  </tr>
                </thead>
                <tbody id="uptrendBody">
                  <tr><td colspan="6" class="muted">点击“筛选上行股票”加载列表</td></tr>
                </tbody>
              </table>
            </div>
            <div class="section-title">历史任务</div>
            <div class="actions">
              <div>
                <label>状态过滤</label>
                <select id="historyStatus">
                  <option value="">全部</option>
                  <option value="queued">queued</option>
                  <option value="running">running</option>
                  <option value="done">done</option>
                  <option value="error">error</option>
                </select>
              </div>
              <button id="refreshHistoryBtn" class="secondary" type="button">刷新历史任务</button>
              <span id="historyStatusText" class="muted">等待加载</span>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>任务ID</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th>耗时(ms)</th>
                    <th>返回数</th>
                    <th>参数</th>
                  </tr>
                </thead>
                <tbody id="historyBody">
                  <tr><td colspan="6" class="muted">点击“刷新历史任务”加载</td></tr>
                </tbody>
              </table>
            </div>
            <div class="hint">点击任意股票后，在右侧复用同一份报告预览。</div>
          </div>

          <div class="split-line"></div>
          <div id="error" class="error"></div>
          <div id="summary" class="summary"></div>
          <div class="hint">数据库连接由后端环境变量管理。</div>
        </div>
      </div>
      <div class="card right-card">
        <div class="preview-toolbar">
          <div class="preview-title">报告预览</div>
          <div class="actions" style="margin-top:0">
            <button id="openBtn" class="secondary" disabled>新窗口打开报告</button>
            <button id="fsBtn" class="secondary" type="button">全屏预览</button>
          </div>
        </div>
        <div class="iframe-wrap" id="iframeWrap">
          <iframe id="viewer" src="about:blank"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script>
    const tabButtons = Array.from(document.querySelectorAll(".tab-btn"));
    const panelSingle = document.getElementById("panelSingle");
    const panelUptrend = document.getElementById("panelUptrend");
    const runBtn = document.getElementById("runBtn");
    const singleStatusEl = document.getElementById("singleStatus");
    const scanBtn = document.getElementById("scanBtn");
    const clearBtn = document.getElementById("clearBtn");
    const upStatusEl = document.getElementById("upStatus");
    const upErrorEl = document.getElementById("upError");
    const upMetaEl = document.getElementById("upMeta");
    const uptrendBody = document.getElementById("uptrendBody");
    const historyStatusSelect = document.getElementById("historyStatus");
    const refreshHistoryBtn = document.getElementById("refreshHistoryBtn");
    const historyStatusText = document.getElementById("historyStatusText");
    const historyBody = document.getElementById("historyBody");
    const openBtn = document.getElementById("openBtn");
    const fsBtn = document.getElementById("fsBtn");
    const errEl = document.getElementById("error");
    const summaryEl = document.getElementById("summary");
    const viewer = document.getElementById("viewer");
    const iframeWrap = document.getElementById("iframeWrap");
    let uptrendItems = [];
    let historyItems = [];
    let currentHtmlUrl = "";

    function setSingleStatus(text, cls) {
      singleStatusEl.className = cls || "muted";
      singleStatusEl.textContent = text;
    }

    function setUpStatus(text, cls) {
      upStatusEl.className = cls || "muted";
      upStatusEl.textContent = text;
    }

    function setHistoryStatus(text, cls) {
      historyStatusText.className = cls || "muted";
      historyStatusText.textContent = text;
    }

    function getVal(id) { return document.getElementById(id).value; }
    function toNum(id) { return Number(getVal(id)); }

    function switchTab(tab) {
      tabButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.tab === tab);
      });
      panelSingle.classList.toggle("active", tab === "single");
      panelUptrend.classList.toggle("active", tab === "uptrend");
    }

    function adjustIframeHeight() {
      if (!currentHtmlUrl) return;
      if (document.fullscreenElement === iframeWrap) return;
      try {
        const doc = viewer.contentDocument;
        if (!doc) return;
        const body = doc.body;
        const root = doc.documentElement;
        const contentHeight = Math.max(
          body ? body.scrollHeight : 0,
          root ? root.scrollHeight : 0,
          560
        );
        const target = Math.max(560, Math.min(1600, contentHeight + 12));
        viewer.style.height = `${target}px`;
      } catch (_) {
        // no-op
      }
    }

    function escHtml(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function fmtPct(v) {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "n/a";
      const n = Number(v);
      const sign = n > 0 ? "+" : "";
      return `${sign}${n.toFixed(2)}%`;
    }

    function fmtDateTime(v) {
      if (!v) return "-";
      const s = String(v).replace("T", " ");
      return s.length > 19 ? s.slice(0, 19) : s;
    }

    function fmtParams(p) {
      if (!p) return "-";
      return `th=${p.threshold}, gap=${p.min_gap}, lb=${p.lookback_days}, k=${p.top_k}`;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function renderSummary(summary) {
      if (!summary) { summaryEl.innerHTML = ""; return; }
      const items = [
        ["股票", `${summary.stock_name} (${summary.ts_code})`],
        ["区间", `${summary.date_range[0]} ~ ${summary.date_range[1]}`],
        ["样本交易日", summary.sample_days],
        ["周期数", summary.cycle_count],
        ["极值点", summary.pivot_count],
        ["收盘区间", `${summary.min_close} ~ ${summary.max_close}`],
        ["最新收盘", `${summary.latest_date} / ${summary.latest_close}`],
        ["参数", `threshold=${summary.threshold}, gap=${summary.min_gap}`],
      ];
      summaryEl.innerHTML = items.map(([k,v]) =>
        `<div class="kpi"><div class="k">${k}</div><div class="v">${v}</div></div>`
      ).join("");
    }

    async function runReportByName() {
      errEl.textContent = "";
      setSingleStatus("生成中...", "muted");
      openBtn.disabled = true;
      try {
        const body = {
          name: getVal("name").trim(),
          threshold: toNum("threshold"),
          min_gap: toNum("minGap"),
          lookback_days: toNum("lookback"),
        };
        const resp = await fetch("/api/reports", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || "request failed");
        currentHtmlUrl = data.html_url;
        viewer.style.height = "72vh";
        viewer.src = currentHtmlUrl;
        openBtn.disabled = false;
        renderSummary(data.summary);
        setSingleStatus("生成成功", "ok");
      } catch (e) {
        setSingleStatus("生成失败", "error");
        errEl.textContent = String(e.message || e);
      }
    }

    async function runReportByCode(tsCode, options) {
      errEl.textContent = "";
      openBtn.disabled = true;
      setUpStatus(`生成 ${tsCode} 报告中...`, "muted");
      try {
        const body = {
          ts_code: tsCode,
          threshold: options.threshold,
          min_gap: options.min_gap,
          lookback_days: options.lookback_days,
          end_date: options.end_date || null,
        };
        const resp = await fetch("/api/reports/by-code", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || "request failed");
        currentHtmlUrl = data.html_url;
        viewer.style.height = "72vh";
        viewer.src = currentHtmlUrl;
        openBtn.disabled = false;
        renderSummary(data.summary);
        setUpStatus(`报告已生成: ${data.summary.stock_name}`, "ok");
      } catch (e) {
        setUpStatus("报告生成失败", "error");
        errEl.textContent = String(e.message || e);
      }
    }

    function getUptrendParams() {
      return {
        threshold: toNum("upThreshold"),
        min_gap: toNum("upMinGap"),
        lookback_days: toNum("upLookback"),
        min_rows: toNum("upMinRows"),
        top_k: toNum("upTopK"),
        end_date: getVal("upEndDate").trim(),
      };
    }

    function renderUptrendRows(items) {
      if (!items.length) {
        uptrendBody.innerHTML = '<tr><td colspan="6" class="muted">未筛选到符合条件的股票</td></tr>';
        return;
      }
      uptrendBody.innerHTML = items.map((item, idx) => {
        const pct = fmtPct(item.latest_cycle_chg_pct);
        const pctClass = Number(item.latest_cycle_chg_pct) >= 0 ? "rise" : "fall";
        return `
          <tr data-code="${escHtml(item.ts_code)}" data-idx="${idx}">
            <td>${escHtml(item.name)}</td>
            <td>${escHtml(item.ts_code)}</td>
            <td>${Number(item.last_close || 0).toFixed(2)}</td>
            <td>${escHtml(item.last_trade_date)}</td>
            <td class="${pctClass}">${pct}</td>
            <td>${Number(item.since_last_pivot_days || 0)}</td>
          </tr>
        `;
      }).join("");
    }

    async function fetchUptrendStocks() {
      upErrorEl.textContent = "";
      setUpStatus("筛选中...", "muted");
      try {
        const p = getUptrendParams();
        const query = new URLSearchParams({
          threshold: String(p.threshold),
          min_gap: String(p.min_gap),
          lookback_days: String(p.lookback_days),
          min_rows: String(p.min_rows),
          top_k: String(p.top_k),
        });
        if (p.end_date) query.set("end_date", p.end_date);
        const resp = await fetch(`/api/uptrend-stocks?${query.toString()}`);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || "request failed");
        if (resp.status === 202 && data.task_id) {
          setUpStatus("任务已提交，后台计算中...", "muted");
          const deadline = Date.now() + 5 * 60 * 1000;
          let taskData = null;
          const pollUrl = data.poll_url || `/api/uptrend-stocks/tasks/${data.task_id}`;
          while (Date.now() < deadline) {
            await sleep(1500);
            const taskResp = await fetch(pollUrl);
            const taskJson = await taskResp.json();
            if (taskResp.status === 500) {
              throw new Error(taskJson.error || "async task failed");
            }
            if (!taskResp.ok) {
              throw new Error(taskJson.detail || "task poll failed");
            }
            if (taskJson.status === "done") {
              taskData = taskJson;
              break;
            }
            if (taskJson.status === "error") {
              throw new Error(taskJson.error || "async task failed");
            }
            setUpStatus(`后台计算中... 任务 ${data.task_id}`, "muted");
          }
          if (!taskData) throw new Error("任务超时，请稍后重试");
          uptrendItems = taskData.items || [];
          renderUptrendRows(uptrendItems);
          upMetaEl.textContent = `共筛选 ${taskData.count} 只，当前返回 ${taskData.returned} 只（按上行周期强度降序）`;
          setUpStatus("筛选完成", "ok");
          loadTaskHistory();
          return;
        }
        uptrendItems = data.items || [];
        renderUptrendRows(uptrendItems);
        upMetaEl.textContent = `共筛选 ${data.count} 只，当前返回 ${data.returned} 只（按上行周期强度降序）`;
        setUpStatus("筛选完成", "ok");
        loadTaskHistory();
      } catch (e) {
        uptrendItems = [];
        renderUptrendRows(uptrendItems);
        setUpStatus("筛选失败", "error");
        upErrorEl.textContent = String(e.message || e);
      }
    }

    function renderHistoryRows(items) {
      if (!items.length) {
        historyBody.innerHTML = '<tr><td colspan="6" class="muted">暂无历史任务</td></tr>';
        return;
      }
      historyBody.innerHTML = items.map((item) => {
        const cls = `tag ${escHtml(item.status || "")}`;
        return `
          <tr class="history-row" data-task-id="${escHtml(item.task_id)}">
            <td>${escHtml(item.task_id)}</td>
            <td><span class="${cls}">${escHtml(item.status || "-")}</span></td>
            <td>${escHtml(fmtDateTime(item.created_at))}</td>
            <td>${item.duration_ms == null ? "-" : Number(item.duration_ms)}</td>
            <td>${item.returned == null ? "-" : Number(item.returned)}</td>
            <td>${escHtml(fmtParams(item.params))}</td>
          </tr>
        `;
      }).join("");
    }

    async function loadTaskHistory() {
      setHistoryStatus("加载中...", "muted");
      try {
        const query = new URLSearchParams({
          page: "1",
          page_size: "20",
        });
        const s = historyStatusSelect.value.trim();
        if (s) query.set("status", s);
        const resp = await fetch(`/api/uptrend-stocks/task-history?${query.toString()}`);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || "history request failed");
        historyItems = data.items || [];
        renderHistoryRows(historyItems);
        setHistoryStatus(`已加载 ${historyItems.length} / 总计 ${data.total || 0}`, "ok");
      } catch (e) {
        historyItems = [];
        renderHistoryRows(historyItems);
        setHistoryStatus("加载失败", "error");
        upErrorEl.textContent = String(e.message || e);
      }
    }

    async function loadTaskItems(taskId) {
      setUpStatus(`加载任务 ${taskId} 结果中...`, "muted");
      try {
        const resp = await fetch(`/api/uptrend-stocks/tasks/${encodeURIComponent(taskId)}/items?page=1&page_size=500`);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || data.error || "load task items failed");
        uptrendItems = data.items || [];
        renderUptrendRows(uptrendItems);
        upMetaEl.textContent = `任务 ${taskId} | 返回 ${uptrendItems.length} 条`;
        setUpStatus("历史任务结果已加载", "ok");
      } catch (e) {
        setUpStatus("加载历史任务失败", "error");
        upErrorEl.textContent = String(e.message || e);
      }
    }

    tabButtons.forEach((btn) => {
      btn.addEventListener("click", () => switchTab(btn.dataset.tab));
    });

    runBtn.addEventListener("click", runReportByName);

    scanBtn.addEventListener("click", fetchUptrendStocks);
    refreshHistoryBtn.addEventListener("click", loadTaskHistory);
    historyStatusSelect.addEventListener("change", loadTaskHistory);

    clearBtn.addEventListener("click", () => {
      uptrendItems = [];
      upMetaEl.textContent = "";
      upErrorEl.textContent = "";
      renderUptrendRows(uptrendItems);
      setUpStatus("已清空", "muted");
    });

    historyBody.addEventListener("click", async (event) => {
      const row = event.target.closest("tr[data-task-id]");
      if (!row) return;
      const taskId = row.dataset.taskId;
      if (!taskId) return;
      Array.from(historyBody.querySelectorAll("tr")).forEach((tr) => tr.classList.remove("selected"));
      row.classList.add("selected");
      await loadTaskItems(taskId);
    });

    uptrendBody.addEventListener("click", async (event) => {
      const row = event.target.closest("tr[data-code]");
      if (!row) return;
      const code = row.dataset.code;
      if (!code) return;
      Array.from(uptrendBody.querySelectorAll("tr")).forEach((tr) => tr.classList.remove("selected"));
      row.classList.add("selected");
      const p = getUptrendParams();
      await runReportByCode(code, {
        threshold: p.threshold,
        min_gap: p.min_gap,
        lookback_days: p.lookback_days,
        end_date: p.end_date,
      });
    });

    openBtn.addEventListener("click", () => {
      if (currentHtmlUrl) window.open(currentHtmlUrl, "_blank");
    });

    fsBtn.addEventListener("click", async () => {
      try {
        if (document.fullscreenElement === iframeWrap) {
          await document.exitFullscreen();
          fsBtn.textContent = "全屏预览";
          return;
        }
        if (iframeWrap.requestFullscreen) {
          await iframeWrap.requestFullscreen();
          fsBtn.textContent = "退出全屏";
        }
      } catch (_) {
        // no-op
      }
    });

    document.addEventListener("fullscreenchange", () => {
      if (document.fullscreenElement !== iframeWrap) {
        fsBtn.textContent = "全屏预览";
        adjustIframeHeight();
      }
    });

    viewer.addEventListener("load", () => {
      try {
        if (viewer.contentWindow) viewer.contentWindow.scrollTo(0, 0);
      } catch (_) {
        // no-op
      }
      adjustIframeHeight();
      setTimeout(adjustIframeHeight, 180);
      setTimeout(adjustIframeHeight, 450);
    });

    window.addEventListener("resize", () => {
      clearTimeout(window.__viewerResizeTimer);
      window.__viewerResizeTimer = setTimeout(adjustIframeHeight, 120);
    });

    switchTab("single");
    loadTaskHistory();
  </script>
</body>
</html>
